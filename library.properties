name=esp-rtosSerial
version=2.2.1
author=Hamza Yesilmen <resmiyslmn@gmail.com>
maintainer=Hamza Yesilmen <resmiyslmn@gmail.com>
sentence=Thread-safe Serial wrapper with broadcast reads for ESP32 and ESP8266.
paragraph=Inherits from Stream — full native Arduino API (print, println, printf, read, readBytes, readStringUntil, etc.). ESP32: mutex-protected I/O, event-driven broadcast reads via Serial.onReceive(), per-task cursors. ESP8266: thin passthrough wrapper with the same API for cross-platform code.
category=Communication
url=https://github.com/HamzaYslmn/esp-rtosSerial
architectures=esp32,esp8266
