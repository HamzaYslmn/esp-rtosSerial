sentence=Thread-safe Serial for ESP32 FreeRTOS — mutex writes, per-task ring buffer reads.
paragraph=Drop-in thread-safe Serial for multi-core ESP32. Mutex-protected writes (rtosPrint, rtosPrintln, rtosPrintf), non-blocking per-task reads via ring buffers (rtosRead, rtosReadBytes). Background reader task broadcasts input to all registered tasks. 10ms polling, configurable buffer sizes.
