name=Esp32-RTOS-Serial
version=2.1.0
author=Hamza Yesilmen <resmiyslmn@gmail.com>
maintainer=Hamza Yesilmen <resmiyslmn@gmail.com>
sentence=Thread-safe Serial wrapper for ESP32 FreeRTOS with broadcast reads.
paragraph=Inherits from Stream — full native Arduino API (print, println, printf, read, readBytes, readStringUntil, etc.) with mutex-protected I/O. Broadcast byte and line reads let every task see every command. Event-driven via Serial.onReceive(), single ring buffer, auto-subscribing per-task cursors.
category=Communication
url=https://github.com/HamzaYslmn/Esp32-RTOS-Serial
architectures=esp32
